<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 420">
  <defs>
    <style>
      .bg { fill: #1a1a2e; }
      .title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 24px; font-weight: bold; fill: #ffffff; }
      .subtitle { font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; fill: #a0a0a0; }
      .label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 11px; fill: #ffffff; }
      .box { fill: #16213e; rx: 8; }
    </style>
  </defs>
  
  <!-- Background -->
  <rect class="bg" width="600" height="420"/>
  
  <!-- Header -->
  <text class="title" x="30" y="35">Semana 06: Flags y Modificadores</text>
  <text class="subtitle" x="30" y="55">g, i, m, s, u, y, d</text>
  
  <!-- Week indicator -->
  <rect x="520" y="15" width="60" height="25" rx="12" fill="#FF6B35"/>
  <text x="550" y="33" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#1a1a2e">06/08</text>
  
  <!-- Flags Grid -->
  <!-- Row 1 -->
  <rect class="box" x="20" y="75" width="85" height="70"/>
  <text x="62" y="100" text-anchor="middle" font-family="Consolas" font-size="28" font-weight="bold" fill="#FF6B35">g</text>
  <text x="62" y="118" text-anchor="middle" font-family="Arial" font-size="9" fill="#a0a0a0">global</text>
  <text x="62" y="133" text-anchor="middle" font-family="Arial" font-size="8" fill="#ffffff">Todas las</text>
  
  <rect class="box" x="115" y="75" width="85" height="70"/>
  <text x="157" y="100" text-anchor="middle" font-family="Consolas" font-size="28" font-weight="bold" fill="#00BCD4">i</text>
  <text x="157" y="118" text-anchor="middle" font-family="Arial" font-size="9" fill="#a0a0a0">ignoreCase</text>
  <text x="157" y="133" text-anchor="middle" font-family="Arial" font-size="8" fill="#ffffff">May/min</text>
  
  <rect class="box" x="210" y="75" width="85" height="70"/>
  <text x="252" y="100" text-anchor="middle" font-family="Consolas" font-size="28" font-weight="bold" fill="#8BC34A">m</text>
  <text x="252" y="118" text-anchor="middle" font-family="Arial" font-size="9" fill="#a0a0a0">multiline</text>
  <text x="252" y="133" text-anchor="middle" font-family="Arial" font-size="8" fill="#ffffff">^$ por línea</text>
  
  <rect class="box" x="305" y="75" width="85" height="70"/>
  <text x="347" y="100" text-anchor="middle" font-family="Consolas" font-size="28" font-weight="bold" fill="#e91e63">s</text>
  <text x="347" y="118" text-anchor="middle" font-family="Arial" font-size="9" fill="#a0a0a0">dotAll</text>
  <text x="347" y="133" text-anchor="middle" font-family="Arial" font-size="8" fill="#ffffff">. incl. \n</text>
  
  <!-- Row 2 -->
  <rect class="box" x="20" y="155" width="85" height="70"/>
  <text x="62" y="180" text-anchor="middle" font-family="Consolas" font-size="28" font-weight="bold" fill="#9c27b0">u</text>
  <text x="62" y="198" text-anchor="middle" font-family="Arial" font-size="9" fill="#a0a0a0">unicode</text>
  <text x="62" y="213" text-anchor="middle" font-family="Arial" font-size="8" fill="#ffffff">UTF-16 →</text>
  
  <rect class="box" x="115" y="155" width="85" height="70"/>
  <text x="157" y="180" text-anchor="middle" font-family="Consolas" font-size="28" font-weight="bold" fill="#ff9800">y</text>
  <text x="157" y="198" text-anchor="middle" font-family="Arial" font-size="9" fill="#a0a0a0">sticky</text>
  <text x="157" y="213" text-anchor="middle" font-family="Arial" font-size="8" fill="#ffffff">lastIndex</text>
  
  <rect class="box" x="210" y="155" width="85" height="70"/>
  <text x="252" y="180" text-anchor="middle" font-family="Consolas" font-size="28" font-weight="bold" fill="#03a9f4">d</text>
  <text x="252" y="198" text-anchor="middle" font-family="Arial" font-size="9" fill="#a0a0a0">hasIndices</text>
  <text x="252" y="213" text-anchor="middle" font-family="Arial" font-size="8" fill="#ffffff">posiciones</text>
  
  <!-- Examples section -->
  <text class="subtitle" x="30" y="255">EJEMPLOS</text>
  
  <rect x="20" y="265" width="560" height="45" fill="#0d1117" rx="8"/>
  <text x="35" y="285" font-family="Consolas" font-size="13" fill="#a0a0a0">/hello/</text>
  <text x="100" y="285" font-family="Consolas" font-size="13" fill="#FF6B35">gi</text>
  <text x="140" y="285" font-family="Arial" font-size="11" fill="#ffffff">→ "HELLO", "Hello", "hello"</text>
  <text x="35" y="302" font-family="Consolas" font-size="13" fill="#a0a0a0">/^line/</text>
  <text x="110" y="302" font-family="Consolas" font-size="13" fill="#8BC34A">gm</text>
  <text x="140" y="302" font-family="Arial" font-size="11" fill="#ffffff">→ inicio de cada línea</text>
  
  <!-- Unicode section -->
  <text class="subtitle" x="30" y="335">UNICODE PROPERTIES</text>
  
  <rect x="20" y="345" width="560" height="60" fill="#0d1117" rx="8"/>
  <text x="35" y="368" font-family="Consolas" font-size="13">
    <tspan fill="#a0a0a0">/</tspan><tspan fill="#9c27b0">\p{Letter}</tspan><tspan fill="#a0a0a0">+/</tspan><tspan fill="#9c27b0">gu</tspan>
    <tspan fill="#a0a0a0" dx="20">→</tspan>
    <tspan fill="#ffffff" dx="10">"Hola", "你好", "مرحبا"</tspan>
  </text>
  <text x="35" y="390" font-family="Consolas" font-size="13">
    <tspan fill="#a0a0a0">/</tspan><tspan fill="#9c27b0">\p{Emoji}</tspan><tspan fill="#a0a0a0">/</tspan><tspan fill="#9c27b0">gu</tspan>
    <tspan fill="#a0a0a0" dx="20">→</tspan>
    <tspan fill="#ffffff" dx="10">👋, 😀, 🎉</tspan>
  </text>
  
  <!-- Version badges -->
  <rect x="400" y="155" width="45" height="18" rx="9" fill="#FF6B35" opacity="0.3"/>
  <text x="422" y="167" text-anchor="middle" font-family="Arial" font-size="9" fill="#FF6B35">ES2015</text>
  
  <rect x="450" y="155" width="45" height="18" rx="9" fill="#00BCD4" opacity="0.3"/>
  <text x="472" y="167" text-anchor="middle" font-family="Arial" font-size="9" fill="#00BCD4">ES2018</text>
  
  <rect x="500" y="155" width="45" height="18" rx="9" fill="#8BC34A" opacity="0.3"/>
  <text x="522" y="167" text-anchor="middle" font-family="Arial" font-size="9" fill="#8BC34A">ES2022</text>
</svg>
