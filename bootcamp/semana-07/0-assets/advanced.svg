<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 450">
  <defs>
    <style>
      .bg { fill: #1a1a2e; }
      .title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 24px; font-weight: bold; fill: #ffffff; }
      .subtitle { font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; fill: #a0a0a0; }
      .section-title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #ffffff; }
      .code { font-family: 'Consolas', monospace; font-size: 12px; fill: #ffffff; }
      .label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 11px; fill: #ffffff; }
      .box { fill: #16213e; rx: 8; }
    </style>
  </defs>
  
  <!-- Background -->
  <rect class="bg" width="600" height="450"/>
  
  <!-- Header -->
  <text class="title" x="30" y="35">Semana 07: Patrones Avanzados</text>
  <text class="subtitle" x="30" y="55">Named Groups, Optimización, Seguridad</text>
  
  <!-- Week indicator -->
  <rect x="520" y="15" width="60" height="25" rx="12" fill="#FF6B35"/>
  <text x="550" y="33" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#1a1a2e">07/08</text>
  
  <!-- Named Groups Section -->
  <text class="section-title" x="30" y="85">NAMED CAPTURE GROUPS</text>
  
  <rect class="box" x="20" y="95" width="560" height="75"/>
  
  <text x="35" y="118" font-family="Consolas" font-size="13">
    <tspan fill="#a0a0a0">/</tspan>
    <tspan fill="#FF6B35">(?&lt;year&gt;</tspan><tspan fill="#00BCD4">\d{4}</tspan><tspan fill="#FF6B35">)</tspan>
    <tspan fill="#a0a0a0">-</tspan>
    <tspan fill="#8BC34A">(?&lt;month&gt;</tspan><tspan fill="#00BCD4">\d{2}</tspan><tspan fill="#8BC34A">)</tspan>
    <tspan fill="#a0a0a0">-</tspan>
    <tspan fill="#e91e63">(?&lt;day&gt;</tspan><tspan fill="#00BCD4">\d{2}</tspan><tspan fill="#e91e63">)</tspan>
    <tspan fill="#a0a0a0">/</tspan>
  </text>
  
  <text x="35" y="140" font-family="Consolas" font-size="11" fill="#a0a0a0">
    match.groups = { <tspan fill="#FF6B35">year</tspan>: "2024", <tspan fill="#8BC34A">month</tspan>: "03", <tspan fill="#e91e63">day</tspan>: "15" }
  </text>
  
  <text x="35" y="160" font-family="Consolas" font-size="11">
    <tspan fill="#a0a0a0">Backreference: </tspan>
    <tspan fill="#9c27b0">\k&lt;year&gt;</tspan>
    <tspan fill="#a0a0a0" dx="20">Replace: </tspan>
    <tspan fill="#9c27b0">$&lt;year&gt;</tspan>
  </text>
  
  <!-- Optimization Section -->
  <text class="section-title" x="30" y="200">OPTIMIZACIÓN</text>
  
  <!-- Good patterns -->
  <rect x="20" y="210" width="275" height="100" fill="#0d3320" rx="8"/>
  <text x="35" y="230" font-family="Arial" font-size="11" fill="#8BC34A">✅ RECOMENDADO</text>
  
  <text x="35" y="252" font-family="Consolas" font-size="11" fill="#8BC34A">[^x]*</text>
  <text x="120" y="252" font-family="Arial" font-size="10" fill="#ffffff">Negación específica</text>
  
  <text x="35" y="270" font-family="Consolas" font-size="11" fill="#8BC34A">\w{1,50}</text>
  <text x="120" y="270" font-family="Arial" font-size="10" fill="#ffffff">Límite de repetición</text>
  
  <text x="35" y="288" font-family="Consolas" font-size="11" fill="#8BC34A">^pattern$</text>
  <text x="120" y="288" font-family="Arial" font-size="10" fill="#ffffff">Con anclas</text>
  
  <text x="35" y="306" font-family="Consolas" font-size="11" fill="#8BC34A">(?:...)</text>
  <text x="120" y="306" font-family="Arial" font-size="10" fill="#ffffff">Non-capturing</text>
  
  <!-- Bad patterns -->
  <rect x="305" y="210" width="275" height="100" fill="#3d1515" rx="8"/>
  <text x="320" y="230" font-family="Arial" font-size="11" fill="#ff5555">❌ EVITAR</text>
  
  <text x="320" y="252" font-family="Consolas" font-size="11" fill="#ff5555">.*</text>
  <text x="380" y="252" font-family="Arial" font-size="10" fill="#ffffff">Greedy sin límite</text>
  
  <text x="320" y="270" font-family="Consolas" font-size="11" fill="#ff5555">(a+)+</text>
  <text x="380" y="270" font-family="Arial" font-size="10" fill="#ffffff">Cuantificadores anidados</text>
  
  <text x="320" y="288" font-family="Consolas" font-size="11" fill="#ff5555">(a|ab)+</text>
  <text x="380" y="288" font-family="Arial" font-size="10" fill="#ffffff">Alternativas solapadas</text>
  
  <text x="320" y="306" font-family="Consolas" font-size="11" fill="#ff5555">(.+)+</text>
  <text x="380" y="306" font-family="Arial" font-size="10" fill="#ffffff">Exponencial</text>
  
  <!-- ReDoS Section -->
  <text class="section-title" x="30" y="340">CATASTROPHIC BACKTRACKING (ReDoS)</text>
  
  <rect class="box" x="20" y="350" width="560" height="85"/>
  
  <!-- Warning icon -->
  <polygon points="50,375 65,400 35,400" fill="#ff5555" stroke="#ff5555" stroke-width="2"/>
  <text x="50" y="393" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#1a1a2e">!</text>
  
  <text x="80" y="375" font-family="Consolas" font-size="12" fill="#ff5555">/(a+)+$/</text>
  <text x="170" y="375" font-family="Arial" font-size="11" fill="#ffffff">+ input "aaaaaaaaX"</text>
  <text x="320" y="375" font-family="Arial" font-size="11" fill="#ff5555">→ Tiempo exponencial O(2ⁿ)</text>
  
  <text x="80" y="400" font-family="Consolas" font-size="12" fill="#8BC34A">/a+$/</text>
  <text x="170" y="400" font-family="Arial" font-size="11" fill="#ffffff">+ input "aaaaaaaaX"</text>
  <text x="320" y="400" font-family="Arial" font-size="11" fill="#8BC34A">→ Tiempo lineal O(n)</text>
  
  <text x="80" y="425" font-family="Arial" font-size="10" fill="#a0a0a0">Protección: Limitar longitud de input + Timeout + Patrones seguros</text>
</svg>
