<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 420">
  <defs>
    <style>
      .bg { fill: #1a1a2e; }
      .title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 24px; font-weight: bold; fill: #ffffff; }
      .subtitle { font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; fill: #a0a0a0; }
      .code { font-family: 'Consolas', 'Courier New', monospace; font-size: 18px; fill: #FF6B35; }
      .label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 11px; fill: #ffffff; }
      .box { fill: #16213e; rx: 8; }
    </style>
  </defs>
  
  <!-- Background -->
  <rect class="bg" width="600" height="420"/>
  
  <!-- Header -->
  <text class="title" x="30" y="35">Semana 03: Quantifiers</text>
  <text class="subtitle" x="30" y="55">Cuantificadores y repeticiones</text>
  
  <!-- Week indicator -->
  <rect x="520" y="15" width="60" height="25" rx="12" fill="#FF6B35"/>
  <text x="550" y="33" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#1a1a2e">03/08</text>
  
  <!-- Row 1: Basic Quantifiers -->
  <text class="subtitle" x="30" y="80">BÁSICOS</text>
  
  <rect class="box" x="20" y="90" width="130" height="65"/>
  <text x="85" y="115" text-anchor="middle" font-family="Consolas" font-size="28" fill="#FF6B35">*</text>
  <text class="label" x="85" y="140" text-anchor="middle">Cero o más</text>
  
  <rect class="box" x="165" y="90" width="130" height="65"/>
  <text x="230" y="115" text-anchor="middle" font-family="Consolas" font-size="28" fill="#00BCD4">+</text>
  <text class="label" x="230" y="140" text-anchor="middle">Uno o más</text>
  
  <rect class="box" x="310" y="90" width="130" height="65"/>
  <text x="375" y="115" text-anchor="middle" font-family="Consolas" font-size="28" fill="#8BC34A">?</text>
  <text class="label" x="375" y="140" text-anchor="middle">Opcional</text>
  
  <rect class="box" x="455" y="90" width="125" height="65"/>
  <text x="517" y="115" text-anchor="middle" font-family="Consolas" font-size="20" fill="#e74c3c">{n,m}</text>
  <text class="label" x="517" y="140" text-anchor="middle">Entre n y m</text>
  
  <!-- Row 2: Examples -->
  <text class="subtitle" x="30" y="180">EJEMPLOS</text>
  
  <rect class="box" x="20" y="190" width="275" height="55"/>
  <text x="35" y="215" font-family="Consolas" font-size="16" fill="#FF6B35">colou?r</text>
  <text x="150" y="215" font-family="Consolas" font-size="14" fill="#8BC34A">→ color, colour</text>
  
  <rect class="box" x="305" y="190" width="275" height="55"/>
  <text x="320" y="215" font-family="Consolas" font-size="16" fill="#FF6B35">\d{3,5}</text>
  <text x="420" y="215" font-family="Consolas" font-size="14" fill="#8BC34A">→ 123, 1234, 12345</text>
  
  <!-- Row 3: Greedy vs Lazy -->
  <text class="subtitle" x="30" y="275">GREEDY vs LAZY</text>
  
  <rect class="box" x="20" y="285" width="275" height="70"/>
  <text x="35" y="310" font-family="Consolas" font-size="14" fill="#e74c3c">GREEDY: .*</text>
  <text x="35" y="335" font-family="Arial" font-size="12" fill="#a0a0a0">Captura lo MÁXIMO posible</text>
  
  <rect class="box" x="305" y="285" width="275" height="70"/>
  <text x="320" y="310" font-family="Consolas" font-size="14" fill="#8BC34A">LAZY: .*?</text>
  <text x="320" y="335" font-family="Arial" font-size="12" fill="#a0a0a0">Captura lo MÍNIMO posible</text>
  
  <!-- Example Box -->
  <rect x="20" y="365" width="560" height="45" fill="#0d1117" rx="8"/>
  <text x="35" y="385" font-family="Consolas" font-size="14" fill="#FF6B35">/^\d{5}$/</text>
  <text x="150" y="385" font-family="Consolas" font-size="13" fill="#8BC34A">✓ 28001</text>
  <text x="250" y="385" font-family="Consolas" font-size="13" fill="#8BC34A">✓ 08080</text>
  <text x="350" y="385" font-family="Consolas" font-size="13" fill="#e74c3c">✗ 2800</text>
  <text x="450" y="385" font-family="Consolas" font-size="13" fill="#e74c3c">✗ 280001</text>
</svg>
