<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 420">
  <defs>
    <style>
      .bg { fill: #1a1a2e; }
      .title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 24px; font-weight: bold; fill: #ffffff; }
      .subtitle { font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; fill: #a0a0a0; }
      .label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 11px; fill: #ffffff; }
      .box { fill: #16213e; rx: 8; }
    </style>
  </defs>
  
  <!-- Background -->
  <rect class="bg" width="600" height="420"/>
  
  <!-- Header -->
  <text class="title" x="30" y="35">Semana 04: Grupos y Capturas</text>
  <text class="subtitle" x="30" y="55">Capture groups, non-capturing, backreferences</text>
  
  <!-- Week indicator -->
  <rect x="520" y="15" width="60" height="25" rx="12" fill="#FF6B35"/>
  <text x="550" y="33" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#1a1a2e">04/08</text>
  
  <!-- Row 1: Types of Groups -->
  <text class="subtitle" x="30" y="80">TIPOS DE GRUPOS</text>
  
  <rect class="box" x="20" y="90" width="180" height="55"/>
  <text x="110" y="115" text-anchor="middle" font-family="Consolas" font-size="18" fill="#FF6B35">( )</text>
  <text class="label" x="110" y="133" text-anchor="middle">Capture Group</text>
  
  <rect class="box" x="210" y="90" width="180" height="55"/>
  <text x="300" y="115" text-anchor="middle" font-family="Consolas" font-size="18" fill="#00BCD4">(?: )</text>
  <text class="label" x="300" y="133" text-anchor="middle">Non-Capturing</text>
  
  <rect class="box" x="400" y="90" width="180" height="55"/>
  <text x="490" y="115" text-anchor="middle" font-family="Consolas" font-size="15" fill="#8BC34A">(?&lt;n&gt; )</text>
  <text class="label" x="490" y="133" text-anchor="middle">Named Group</text>
  
  <!-- Row 2: Example -->
  <text class="subtitle" x="30" y="170">EJEMPLO: EMAIL</text>
  
  <rect x="20" y="180" width="560" height="60" fill="#0d1117" rx="8"/>
  <text x="40" y="210" font-family="Consolas" font-size="16" fill="#ffffff">
    <tspan fill="#a0a0a0">/</tspan><tspan fill="#FF6B35">(</tspan><tspan fill="#ffffff">[\w.-]+</tspan><tspan fill="#FF6B35">)</tspan><tspan fill="#ffffff">@</tspan><tspan fill="#00BCD4">(</tspan><tspan fill="#ffffff">[\w.-]+</tspan><tspan fill="#00BCD4">)</tspan><tspan fill="#a0a0a0">/</tspan>
  </text>
  <text x="40" y="230" font-family="Arial" font-size="11" fill="#a0a0a0">ana@empresa.com → match[1]="ana", match[2]="empresa.com"</text>
  
  <!-- Row 3: Backreferences -->
  <text class="subtitle" x="30" y="270">BACKREFERENCES</text>
  
  <rect class="box" x="20" y="280" width="275" height="55"/>
  <text x="35" y="305" font-family="Consolas" font-size="14" fill="#FF6B35">\1</text>
  <text x="80" y="305" font-family="Consolas" font-size="12" fill="#8BC34A">(\w+)\s+\1</text>
  <text x="35" y="323" font-family="Arial" font-size="11" fill="#a0a0a0">Palabras duplicadas</text>
  
  <rect class="box" x="305" y="280" width="275" height="55"/>
  <text x="320" y="305" font-family="Consolas" font-size="14" fill="#00BCD4">$1</text>
  <text x="355" y="305" font-family="Consolas" font-size="12" fill="#8BC34A">.replace(/(a)/, "$1b")</text>
  <text x="320" y="323" font-family="Arial" font-size="11" fill="#a0a0a0">En reemplazo</text>
  
  <!-- Row 4: Named Groups -->
  <text class="subtitle" x="30" y="360">NAMED GROUPS</text>
  
  <rect x="20" y="370" width="560" height="40" fill="#0d1117" rx="8"/>
  <text x="40" y="395" font-family="Consolas" font-size="14">
    <tspan fill="#a0a0a0">/</tspan><tspan fill="#8BC34A">(?&lt;dia&gt;</tspan><tspan fill="#ffffff">\d{2}</tspan><tspan fill="#8BC34A">)</tspan><tspan fill="#ffffff">\/</tspan><tspan fill="#8BC34A">(?&lt;mes&gt;</tspan><tspan fill="#ffffff">\d{2}</tspan><tspan fill="#8BC34A">)</tspan><tspan fill="#a0a0a0">/</tspan>
    <tspan fill="#a0a0a0" dx="20">→</tspan>
    <tspan fill="#00BCD4" dx="10">match.groups.dia</tspan>
  </text>
</svg>
